<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; manifest-src 'self'; base-uri 'none'; form-action 'none';">
    <title>간호사 시뮬레이터</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="app-disclaimer" role="note">
        ⓘ <strong>교육 목적 · 임상 적용 금지</strong> ·
        <button class="disclaimer-link" data-action="openErrorReport">오류 신고</button>
    </div>

    <div id="top-bar" class="hidden">
        <button class="back-btn hidden" id="back-btn" data-action="returnToMenu" aria-label="메인 메뉴로 돌아가기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <div class="stat-gauge hp" id="hp-gauge" data-level="hi">
            <span id="hp">100</span>
            <span class="sg-bar"><span class="sg-fill" id="hp-fill" style="width:100%"></span></span>
        </div>
        <div class="stat-gauge rep" id="rep-gauge">
            <span id="rep">0</span>
            <span class="sg-bar"><span class="sg-fill" id="rep-fill" style="width:0%"></span></span>
        </div>
        <div class="top-actions">
            <button class="icon-btn" id="theme-toggle" title="테마" aria-label="테마 전환">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button class="icon-btn" id="sound-toggle" title="사운드" aria-label="사운드 전환">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
            <button class="icon-btn" id="settings-btn" data-action="openSettings" title="설정" aria-label="설정">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>
    </div>

    <div id="progress-wrap" class="hidden" role="progressbar"
         aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-labelledby="progress-text">
        <div id="progress-fill"></div>
    </div>
    <div id="progress-info" class="hidden">
        <span id="progress-text">진행도</span>
        <span id="progress-percent">0%</span>
    </div>

    <div id="inventory-bar" class="hidden"></div>

    <div id="game-area" role="main">
        <!-- 메인 메뉴는 script.js의 returnToMenu()에서 렌더링 -->
    </div>

    <div id="log-bar" class="hidden" role="log" aria-live="polite" aria-atomic="false"></div>

    <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc">
        <h2 id="modal-title" class="modal-heading"></h2>
        <p id="modal-desc" class="modal-subdesc"></p>
        <div id="modal-stats" class="modal-stats-card"></div>

        <hr class="modal-divider">

        <h3 class="modal-section-title">📚 승급 심사 (무한 랜덤 문제풀이)</h3>
        <div class="modal-quiz-card">
            <div class="modal-quiz-header">
                <span>회차: <strong id="left"></strong></span>
                <span>랭크: <strong id="rank">신규</strong></span>
            </div>

            <div id="question-box" class="modal-question" aria-live="polite"></div>
            <div id="choices"></div>

            <div id="result" class="modal-result" aria-live="assertive"></div>
            <div class="modal-score-row">
                <span>현재 점수: <span id="score" class="modal-score">0</span>점</span>
            </div>
        </div>
        <button class="choice-btn center modal-close" data-action="returnToMenu">처음으로 돌아가기 (ESC)</button>
    </div>

    <script src="questions.js"></script>
    <script src="content.js"></script>
    <script src="script.js"></script>
</body>
</html>
