<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="간호국시Sim">
    <link rel="manifest" href="manifest.webmanifest">
    <title>간호사 국가고시 시뮬레이터</title>
    <style>
        :root {
            --primary: #3b82f6;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg: #f1f5f9;
            --text: #0f172a;
            --card: #ffffff;
            --safe-top: env(safe-area-inset-top);
            --safe-bot: env(safe-area-inset-bottom);
        }
        * { -webkit-tap-highlight-color: transparent; }
        html, body { overscroll-behavior-y: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden;
            padding-top: var(--safe-top);
        }
        button, input, select { font-family: inherit; }
        
        #top-bar { display: flex; justify-content: space-between; padding: 12px 15px; background: var(--card); border-bottom: 1px solid #cbd5e1; font-weight: bold; position: sticky; top: 0; z-index: 50; }
        .hidden { display: none !important; }
        
        #progress-wrap { background: #e2e8f0; height: 12px; border-radius: 6px; margin: 12px 15px 4px; overflow: hidden; position: relative; }
        #progress-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s ease; }
        #progress-info { display: flex; justify-content: space-between; font-size: 11px; margin: 0 15px 8px; color: #64748b; font-weight: bold; }
        
        #inventory-bar { display: flex; gap: 5px; padding: 0 15px 10px; flex-wrap: wrap; }
        .badge { background: #cbd5e1; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge.warn { background: var(--warning); color: #fff; }
        .badge.accent { background: var(--primary); color: #fff; }
        .badge.success { background: var(--success); color: #fff; }

        #game-area { padding: 15px; padding-bottom: calc(120px + var(--safe-bot)); }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .scene-emoji { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .scene-title { margin: 0 0 10px 0; font-size: 1.2rem; line-height: 1.3; }
        .scene-desc { font-size: 1rem; line-height: 1.55; margin-bottom: 18px; color: #334155; white-space: pre-wrap; }
        
        .choice-btn {
            width: 100%; padding: 14px; margin-bottom: 10px; border: 1px solid #cbd5e1;
            background: #f8fafc; border-radius: 10px; cursor: pointer; text-align: left;
            font-size: 1rem; line-height: 1.45; transition: background 0.15s, transform 0.05s;
            min-height: 48px; box-sizing: border-box;
        }
        .choice-btn:active { transform: scale(0.99); background: #e2e8f0; }
        .choice-btn.primary { background: var(--primary); color: white; border: none; text-align: center; font-weight: bold; }
        .choice-btn.primary:active { background: #2563eb; }
        .choice-btn.center { text-align: center; }
        .choice-btn:disabled { opacity: 0.6; }

        .shift-option { display: inline-block; padding: 10px 14px; margin: 5px 3px; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; background: #fff; font-size: 0.95rem; min-height: 44px; }
        .shift-option.active { background: var(--primary); color: white; border-color: var(--primary); }
        .menu-container { text-align: center; margin-top: 20px; }

        #log-bar { position: fixed; bottom: 0; left: 0; right: 0; height: calc(90px + var(--safe-bot)); padding-bottom: var(--safe-bot); overflow-y: auto; background: #1e293b; color: #f8fafc; padding-left: 12px; padding-right: 12px; padding-top: 8px; box-sizing: border-box; font-size: 0.85rem; border-top: 2px solid var(--primary); z-index: 40; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #334155; padding-bottom: 4px; }
        .log-entry.log-good { color: var(--success); }
        .log-entry.log-bad { color: var(--danger); }
        .log-entry.log-important { color: var(--warning); font-weight: bold; }

        #modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); color: white; display: none; flex-direction: column; align-items: center; padding: calc(24px + var(--safe-top)) 18px calc(24px + var(--safe-bot)); box-sizing: border-box; overflow-y: auto; z-index: 1000; }
        #modal.active { display: flex; }
        #modal-stats .highlight { font-weight: bold; color: var(--warning); }
        
        .feedback-box { padding: 14px; border-radius: 10px; margin-bottom: 12px; font-weight: bold; line-height: 1.45; }
        .feedback-box.correct { background: #d1fae5; color: #065f46; }
        .feedback-box.wrong { background: #fee2e2; color: #991b1b; }

        .stats-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 0.92rem; }
        .stats-table th, .stats-table td { padding: 8px 6px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .stats-table th { background: #f1f5f9; }
        .acc-good { color: var(--success); font-weight: bold; }
        .acc-mid { color: var(--warning); font-weight: bold; }
        .acc-bad { color: var(--danger); font-weight: bold; }

        @supports (padding: max(0px)) {
          #log-bar { padding-bottom: max(8px, var(--safe-bot)); }
        }
    </style>
</head>
<body>

    <div id="top-bar" class="hidden">
        <div>❤️ HP: <span id="hp" style="color:var(--success)">100</span></div>
        <div>⭐ 평판: <span id="rep">0</span></div>
    </div>

    <div id="progress-wrap" class="hidden">
        <div id="progress-fill"></div>
    </div>
    <div id="progress-info" class="hidden">
        <span id="progress-text">진행도</span>
        <span id="progress-percent">0%</span>
    </div>

    <div id="inventory-bar" class="hidden"></div>

    <div id="game-area">
        <div class="card menu-container">
            <span class="scene-emoji">🏥</span>
            <h2>간호사 국가고시 시뮬레이터</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 18px;">8과목 5지선다, 무한 랜덤 변형. 임상 판단력을 테스트하세요.</p>
            
            <div style="margin-bottom: 18px;">
                <button class="shift-option active" onclick="setShift('Day', 1.0, this)">Day (기본)</button>
                <button class="shift-option" onclick="setShift('Evening', 1.2, this)">Evening (어려움)</button>
                <button class="shift-option" onclick="setShift('Night', 1.5, this)">Night (지옥)</button>
            </div>
            
            <button class="choice-btn primary" onclick="initSurvival()">실전 듀티 시작</button>
            <button class="choice-btn center" onclick="renderQuizMenu()">트레이닝 센터 (8과목 문제은행)</button>
            <button class="choice-btn center" onclick="renderStatsView()">📊 학습 통계 / 오답노트</button>
        </div>
    </div>

    <div id="log-bar" class="hidden"></div>

    <div id="modal">
        <h2 id="modal-title" style="color: var(--danger); margin-bottom: 5px;"></h2>
        <p id="modal-desc" style="text-align: center; color: #cbd5e1; margin-bottom: 16px;"></p>
        <div id="modal-stats" style="margin-bottom: 22px; line-height: 1.8; text-align: center; background: rgba(255,255,255,0.1); padding: 14px; border-radius: 8px; width: 100%;"></div>
        
        <hr style="width: 100%; border: 1px solid #334155; margin-bottom: 16px;">
        
        <h3 style="color: var(--primary); margin: 0 0 12px;">📚 승급 심사 (무한 랜덤 문제풀이)</h3>
        <div style="width: 100%; background: #1e293b; padding: 18px; border-radius: 12px; box-sizing: border-box;">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 14px;">
                <span>남은 문제: <strong id="left" style="color:#fff"></strong></span>
                <span>랭크: <strong id="rank" style="color:var(--warning)">신규</strong></span>
            </div>
            
            <div id="question-box" style="font-weight: bold; margin-bottom: 16px; font-size: 1.05rem; line-height: 1.45; white-space: pre-wrap;"></div>
            <div id="choices"></div>
            
            <div id="result" style="margin-top: 14px; font-weight: bold; text-align: center; padding: 8px;"></div>
            <div style="text-align: center; margin-top: 8px;">
                <span style="font-size: 0.9rem; color: #94a3b8;">현재 점수: <span id="score" style="color:#fff; font-weight:bold;">0</span>점</span>
            </div>
        </div>
        <button class="choice-btn center" style="margin-top: 18px; background: transparent; color: white;" onclick="location.reload()">처음으로 돌아가기</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
