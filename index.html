<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5">
    <meta name="theme-color" content="#7fa881">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="간호사 시뮬레이터">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io https://*.googlesyndication.com https://*.doubleclick.net https://*.google.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https: ; connect-src 'self' https://plausible.io https://*.googlesyndication.com https://*.doubleclick.net https://*.google.com; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com; manifest-src 'self'; base-uri 'none'; form-action 'none';">
    <title>간호사 시뮬레이터</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="build/icon-180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="build/icon-152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="build/icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="description" content="간호 국시 + 임상 시뮬레이션 학습 앱 — 듀티처럼 돌면서 공부.">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* 앱 로더 — JS 로드 전 노출 (FOUC 방지) */
        #app-loader {
            position: fixed;
            inset: 0;
            background: #eef2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity .3s;
        }
        @media (prefers-color-scheme: dark) {
            #app-loader { background: #161b27; }
            #app-loader .loader-title { color: #ecedf0; }
        }
        #app-loader.fade-out { opacity: 0; pointer-events: none; }
        .loader-mark {
            width: 64px; height: 64px;
            border-radius: 18px;
            background: #7fa881;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            box-shadow: 0 8px 24px rgba(127,168,129,.35);
            animation: loaderPulse 1.6s ease-in-out infinite;
        }
        .loader-title {
            margin-top: 18px;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.01em;
        }
        @keyframes loaderPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.95); opacity: 0.85; }
        }
    </style>
</head>
<body>
    <!-- JS 로드 전 노출되는 스플래시. boot() 완료 시 fade-out + 제거 -->
    <div id="app-loader" aria-hidden="true">
        <div class="loader-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" width="40" height="40" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
            <!-- 청진기 + 임상 그래프 = 학습+시뮬 = 브랜드 정체성 -->
            <path d="M16 12 v14 a8 8 0 0 0 16 0 v-14"/>
            <path d="M24 34 a3 3 0 0 0 3 3 a3 3 0 0 0 3 -3 v-2"/>
            <circle cx="44" cy="20" r="3.5"/>
            <path d="M30 32 v6 q0 6 6 6 h2 q6 0 6 -6 v-14"/>
            <path d="M10 50 l5 -6 l5 4 l6 -10 l4 8 l6 -4 l5 3" stroke-width="2.5" opacity="0.7"/>
          </svg>
        </div>
        <div class="loader-title">간호사 시뮬레이터</div>
    </div>

    <div id="app-disclaimer" class="app-disclaimer hidden" role="note">
        교육 목적 · 임상 적용 금지 · <button class="disclaimer-link" data-action="openErrorReport">오류 신고</button>
    </div>

    <div id="top-bar" class="hidden">
        <button class="back-btn hidden" id="back-btn" data-action="returnToMenu" aria-label="메인 메뉴로 돌아가기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M15 18l-6-6 6-6"/>
            </svg>
        </button>
        <div class="stat-gauge hp hidden" id="hp-gauge" data-level="hi">
            <span id="hp">100</span>
            <span class="sg-bar"><span class="sg-fill" id="hp-fill" style="width:100%"></span></span>
        </div>
        <div class="stat-gauge rep hidden" id="rep-gauge">
            <span id="rep">0</span>
            <span class="sg-bar"><span class="sg-fill" id="rep-fill" style="width:0%"></span></span>
        </div>
        <div class="top-actions">
            <button class="icon-btn" id="theme-toggle" title="테마" aria-label="테마 전환" hidden>🌙</button>
            <button class="icon-btn" id="sound-toggle" title="사운드" aria-label="사운드 전환" hidden>🔊</button>
            <button class="icon-btn" id="kebab-btn" data-action="toggleKebab" title="메뉴" aria-label="메뉴" aria-haspopup="true" aria-expanded="false">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true">
                    <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
                </svg>
            </button>
            <button class="icon-btn" id="settings-btn" data-action="openSettings" title="설정" aria-label="설정" hidden>⚙️</button>
        </div>
        <div id="kebab-menu" class="kebab-menu hidden" role="menu" aria-labelledby="kebab-btn">
            <button class="kebab-item" data-action="toggleTheme" role="menuitem"><span class="kebab-icon">🌙</span><span>테마</span></button>
            <button class="kebab-item" data-action="toggleSound" role="menuitem"><span class="kebab-icon">🔊</span><span id="kebab-sound-label">사운드</span></button>
            <button class="kebab-item" data-action="openSettings" role="menuitem"><span class="kebab-icon">⚙️</span><span>설정</span></button>
        </div>
    </div>

    <div id="progress-wrap" class="hidden" role="progressbar"
         aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-labelledby="progress-text">
        <div id="progress-fill"></div>
    </div>
    <div id="progress-info" class="hidden">
        <span id="progress-text"></span>
        <span id="progress-percent"></span>
    </div>

    <div id="inventory-bar" class="hidden"></div>

    <div id="game-area" role="main">
        <!-- JS 가 채움 -->
    </div>

    <div id="log-bar" class="hidden" role="log" aria-live="polite" aria-atomic="false"></div>

    <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc">
        <h2 id="modal-title" class="modal-heading"></h2>
        <p id="modal-desc" class="modal-subdesc"></p>
        <div id="modal-stats" class="modal-stats-card"></div>

        <div id="revive-slot" class="revive-slot hidden"></div>

        <hr class="modal-divider">

        <h3 class="modal-section-title" id="modal-section-title"></h3>
        <div class="modal-quiz-card">
            <div class="modal-quiz-header">
                <span id="modal-quiz-left-wrap" class="hidden">회차: <strong id="left"></strong></span>
                <span id="modal-quiz-rank-wrap" class="hidden">랭크: <strong id="rank"></strong></span>
            </div>

            <div id="question-box" class="modal-question" aria-live="polite"></div>
            <div id="choices"></div>

            <div id="result" class="modal-result" aria-live="assertive"></div>
            <div class="modal-score-row hidden" id="modal-score-wrap">
                <span>현재 점수: <span id="score" class="modal-score">0</span>점</span>
            </div>
        </div>
        <button class="choice-btn center modal-close" data-action="returnToMenu" aria-label="닫기">닫기</button>
    </div>

    <script src="questions.js"></script>
    <!-- nclex-content.js (2MB) 는 NCLEX 메뉴 진입 시 동적 로드 (lazy) - 초기 로드 시간 단축 -->
    <script src="kor-content.js"></script>
    <script src="content.js"></script>
    <script src="images/image-map.js"></script>
    <script src="script.js"></script>
</body>
</html>
