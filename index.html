<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>간호사 시뮬레이터</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="top-bar" class="hidden">
        <div>❤️ HP: <span id="hp" style="color:var(--success)">100</span></div>
        <div>⭐ 평판: <span id="rep">0</span></div>
        <div class="top-actions">
            <button class="icon-btn" id="theme-toggle" title="테마">🌙</button>
            <button class="icon-btn" id="sound-toggle" title="사운드">🔊</button>
        </div>
    </div>

    <div id="progress-wrap" class="hidden">
        <div id="progress-fill"></div>
    </div>
    <div id="progress-info" class="hidden">
        <span id="progress-text">진행도</span>
        <span id="progress-percent">0%</span>
    </div>

    <div id="inventory-bar" class="hidden"></div>

    <div id="game-area">
        <!-- 메인 메뉴는 script.js의 returnToMenu()에서 렌더링 -->
    </div>

    <div id="log-bar" class="hidden"></div>

    <div id="modal">
        <h2 id="modal-title" style="color: var(--danger); margin-bottom: 5px;"></h2>
        <p id="modal-desc" style="text-align: center; color: #cbd5e1; margin-bottom: 20px;"></p>
        <div id="modal-stats" style="margin-bottom: 30px; line-height: 1.8; text-align: center; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; width: 100%;"></div>

        <hr style="width: 100%; border: 1px solid #334155; margin-bottom: 20px;">

        <h3 style="color: var(--primary);">📚 승급 심사 (무한 랜덤 문제풀이)</h3>
        <div style="width: 100%; background: #1e293b; padding: 20px; border-radius: 12px; box-sizing: border-box;">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 15px;">
                <span>회차: <strong id="left" style="color:#fff"></strong></span>
                <span>랭크: <strong id="rank" style="color:var(--warning)">신규</strong></span>
            </div>

            <div id="question-box" style="font-weight: bold; margin-bottom: 20px; font-size: 1.1rem; line-height: 1.4; white-space: pre-wrap;"></div>
            <div id="choices"></div>

            <div id="result" style="margin-top: 15px; font-weight: bold; text-align: center; padding: 10px;"></div>
            <div style="text-align: center; margin-top: 10px;">
                <span style="font-size: 0.9rem; color: #94a3b8;">현재 점수: <span id="score" style="color:#fff; font-weight:bold;">0</span>점</span>
            </div>
        </div>
        <button class="choice-btn center" style="margin-top: 20px; background: transparent; color: white;" onclick="returnToMenu()">처음으로 돌아가기</button>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
