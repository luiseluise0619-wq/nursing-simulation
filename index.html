<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Nurse Simulator · 간호사 시뮬레이터</title>
    <meta name="description" content="500+ NCLEX·Korean Boards-style randomized nursing questions (75 image-based) across 8 subjects, SRS Leitner, timed mock exam, narrative survival mode. Bilingual KO/EN.">
    <meta name="keywords" content="nurse, NCLEX, 간호사 국가고시, nursing simulator, clinical judgment, study">
    <meta name="theme-color" content="#7fa881">
    <meta name="color-scheme" content="light">

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
    <link rel="icon" type="image/png" sizes="64x64" href="./icons/favicon-64.png">
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="NurseSim">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Open Graph -->
    <meta property="og:title" content="Nurse Simulator">
    <meta property="og:description" content="Practice clinical judgment with 508 randomized nursing questions (75 image-based). Bilingual KO/EN.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="./icons/icon.svg">

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --sage: #7fa881;
            --sage-dark: #5e8961;
            --sage-light: #b6cfb7;
            --sage-tint: rgba(127, 168, 129, 0.10);
            --primary: #7fa881;
            --primary-dark: #5e8961;
            --primary-light: #b6cfb7;
            --secondary: #7fa881;
            --accent: #7fa881;
            --danger: #c97a7a;
            --warning: #d4a259;
            --success: #7fa881;
            --bg: #eef2f5;
            --card: #ffffff;
            --card-border: transparent;
            --text: #1e293b;
            --text-light: #64748b;
            --shadow-dark: #d1d9e0;
            --shadow-light: #ffffff;
            --radius: 22px;
            --radius-sm: 16px;
            --radius-pill: 999px;
            /* Soft neumorphic dual shadow */
            --neu-out: 8px 8px 20px var(--shadow-dark), -8px -8px 20px var(--shadow-light);
            --neu-out-sm: 4px 4px 10px var(--shadow-dark), -4px -4px 10px var(--shadow-light);
            --neu-in: inset 5px 5px 12px var(--shadow-dark), inset -5px -5px 12px var(--shadow-light);
            --neu-in-sm: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            --shadow-card: var(--neu-out);
            --shadow-hover: 10px 10px 24px var(--shadow-dark), -10px -10px 24px var(--shadow-light);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            font-feature-settings: "tnum" 0;
            padding-top: env(safe-area-inset-top);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        #log-bar {
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        button { touch-action: manipulation; font-family: inherit; }

        /* Removed background gradient blobs — neumorphic uses flat warm gray */

        /* Top Bar */
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 22px;
            background: var(--bg);
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        #top-bar > div {
            background: var(--card);
            padding: 9px 16px;
            border-radius: var(--radius-pill);
            font-size: 0.85rem;
            box-shadow: var(--neu-out-sm);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.01em;
        }
        .hidden { display: none !important; }

        /* Progress */
        #progress-wrap {
            background: var(--bg);
            height: 14px;
            border-radius: var(--radius-pill);
            margin: 16px 22px 8px;
            overflow: hidden;
            position: relative;
            box-shadow: var(--neu-in-sm);
        }
        #progress-fill {
            background: var(--sage);
            height: 100%;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: var(--radius-pill);
            position: relative;
        }
        #progress-fill::after { content: none; }
        #progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin: 0 22px 14px;
            color: var(--text-light);
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }

        /* Inventory / Badges */
        #inventory-bar {
            display: flex;
            gap: 8px;
            padding: 0 22px 14px;
            flex-wrap: wrap;
        }
        .badge {
            background: var(--card);
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 700;
            box-shadow: var(--neu-out-sm);
            letter-spacing: 0.02em;
            color: var(--text);
        }
        .badge.warn {
            background: var(--card);
            color: var(--warning);
        }
        .badge.accent {
            background: var(--sage);
            color: #fff;
            box-shadow: 4px 4px 10px var(--shadow-dark);
        }
        .badge.success {
            background: var(--card);
            color: var(--sage-dark);
        }

        /* Game Area & Cards */
        #game-area {
            padding: 18px 22px;
            padding-bottom: 130px;
            position: relative;
            z-index: 1;
        }
        .card {
            background: var(--card);
            padding: 26px 24px;
            border-radius: var(--radius);
            border: none;
            box-shadow: var(--neu-out);
            margin-bottom: 18px;
            animation: fadeUp 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .scene-emoji {
            font-size: 2.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--bg);
            border-radius: 18px;
            box-shadow: var(--neu-in-sm);
            margin-bottom: 12px;
            animation: bounce 0.8s ease;
        }
        @keyframes bounce {
            0% { transform: scale(0.6); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .scene-title {
            margin: 0 0 12px 0;
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
            line-height: 1.4;
        }
        .scene-desc {
            font-size: 0.95rem;
            line-height: 1.65;
            margin-bottom: 22px;
            color: #334155;
            white-space: pre-wrap;
        }

        /* Category tag */
        .category-tag {
            display: inline-block;
            font-weight: 700;
            color: var(--sage-dark);
            background: var(--sage-tint);
            padding: 5px 12px;
            border-radius: var(--radius-pill);
            font-size: 0.7rem;
            margin-bottom: 14px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .category-tag .part {
            opacity: 0.85;
            font-weight: 600;
            margin-left: 4px;
        }

        /* Meta chips */
        .meta-row { margin-bottom: 14px; }
        .meta-chip {
            display: inline-block;
            margin-right: 6px;
            margin-bottom: 4px;
            font-size: 11px;
            color: var(--text-light);
            background: var(--bg);
            padding: 5px 12px;
            border-radius: var(--radius-pill);
            font-weight: 700;
            box-shadow: var(--neu-in-sm);
            letter-spacing: 0.04em;
        }

        /* Buttons */
        .choice-btn {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 12px;
            border: none;
            background: var(--card);
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            line-height: 1.5;
            box-shadow: var(--neu-out-sm);
        }
        .choice-btn:hover {
            box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
            transform: translateY(-1px);
        }
        .choice-btn:active { transform: translateY(0); box-shadow: var(--neu-in-sm); }
        .choice-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
        .choice-btn.primary {
            background: var(--sage);
            color: white;
            text-align: center;
            font-weight: 700;
            box-shadow: 6px 6px 14px var(--shadow-dark), -6px -6px 14px var(--shadow-light);
            letter-spacing: 0.01em;
        }
        .choice-btn.primary:hover {
            background: var(--sage-dark);
            transform: translateY(-1px);
        }
        .choice-btn.center { text-align: center; }
        .choice-btn.ghost {
            background: var(--bg);
            color: var(--text);
            box-shadow: var(--neu-in-sm);
        }
        .choice-btn.ghost:hover {
            box-shadow: var(--neu-in);
        }

        /* Shift Options */
        .shift-option {
            display: inline-block;
            padding: 10px 18px;
            margin: 4px;
            border: none;
            border-radius: var(--radius-pill);
            cursor: pointer;
            background: var(--card);
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            font-family: inherit;
            color: var(--text);
            box-shadow: var(--neu-out-sm);
        }
        .shift-option:hover { transform: translateY(-1px); }
        .shift-option.active {
            background: var(--sage);
            color: white;
            box-shadow: 4px 4px 10px var(--shadow-dark);
        }

        .menu-container { text-align: center; padding-top: 18px; }
        .menu-container h2 {
            color: var(--sage-dark);
            font-weight: 800;
            font-size: 1.8rem;
            margin: 8px 0 4px;
            letter-spacing: -0.03em;
        }
        .menu-container .subtitle {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 22px;
            font-weight: 500;
        }
        .shift-label {
            font-size: 0.72rem;
            color: var(--text-light);
            letter-spacing: 0.08em;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Log Bar */
        #log-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 110px;
            overflow-y: auto;
            background: var(--bg);
            color: var(--text);
            padding: 14px 18px;
            box-sizing: border-box;
            font-size: 0.85rem;
            box-shadow: 0 -8px 20px rgba(209, 217, 224, 0.7), 0 -1px 0 rgba(255,255,255,0.6) inset;
            z-index: 40;
        }
        .log-entry {
            margin-bottom: 6px;
            padding: 4px 10px 4px 12px;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
            border-left: 3px solid var(--text-light);
            color: var(--text-light);
            font-weight: 500;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-6px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .log-entry.log-good { color: var(--sage-dark); border-left-color: var(--sage); }
        .log-entry.log-bad { color: var(--danger); border-left-color: var(--danger); }
        .log-entry.log-important { color: var(--warning); border-left-color: var(--warning); font-weight: 700; }

        /* Modal */
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 30px 22px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 1000;
        }
        #modal.active { display: flex; }
        #modal h2 {
            margin: 0 0 6px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--sage-dark);
        }
        #modal-stats {
            margin-bottom: 26px;
            line-height: 1.8;
            text-align: center;
            background: var(--card);
            padding: 20px 22px;
            border-radius: var(--radius);
            width: 100%;
            box-shadow: var(--neu-out);
            color: var(--text);
        }
        #modal-stats .highlight {
            font-weight: 800;
            color: var(--sage-dark);
            font-size: 1.1em;
            font-variant-numeric: tabular-nums;
        }
        #modal hr {
            width: 100%;
            border: 0;
            border-top: 1px solid rgba(100, 116, 139, 0.18);
            margin: 18px 0;
        }
        #modal h3 {
            color: var(--sage-dark);
            font-weight: 700;
            margin-bottom: 14px;
        }

        /* Quiz panel inside modal */
        .quiz-panel {
            width: 100%;
            background: var(--card);
            padding: 24px 22px;
            border-radius: var(--radius);
            box-sizing: border-box;
            box-shadow: var(--neu-out);
            color: var(--text);
        }
        .quiz-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: var(--text-light);
            border-bottom: 1px solid rgba(100, 116, 139, 0.15);
            padding-bottom: 12px;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-variant-numeric: tabular-nums;
        }
        #question-box {
            font-weight: 700;
            margin-bottom: 18px;
            font-size: 1.05rem;
            line-height: 1.6;
            white-space: pre-wrap;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        #choices .choice-btn {
            background: var(--bg);
            color: var(--text);
            box-shadow: var(--neu-in-sm);
        }
        #choices .choice-btn:hover {
            box-shadow: var(--neu-in);
        }
        #result {
            margin-top: 14px;
            font-weight: 700;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            min-height: 1em;
        }

        .feedback-box {
            padding: 18px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.6;
            animation: fadeUp 0.3s ease;
            background: var(--card);
            box-shadow: var(--neu-out-sm);
            border-left: 4px solid var(--sage);
        }
        .feedback-box.correct {
            border-left-color: var(--sage);
            color: var(--sage-dark);
        }
        .feedback-box.wrong {
            border-left-color: var(--danger);
            color: #8b3939;
        }
        .feedback-title {
            font-size: 1.05rem;
            margin-bottom: 4px;
            font-weight: 800;
            letter-spacing: -0.01em;
        }
        .feedback-text {
            font-size: 0.9rem;
            font-weight: 500;
            line-height: 1.6;
            color: var(--text);
        }
        .feedback-row {
            font-size: 0.92rem;
            margin-top: 8px;
            line-height: 1.5;
            color: var(--text);
        }
        .feedback-divider {
            border: 0;
            border-top: 1px dashed rgba(100, 116, 139, 0.25);
            margin: 12px 0 8px;
        }

        /* Choice button answer reveal */
        .choice-btn.answer-correct {
            background: var(--card) !important;
            color: var(--sage-dark) !important;
            box-shadow: inset 0 0 0 2px var(--sage), var(--neu-out-sm) !important;
            font-weight: 700 !important;
        }
        .choice-btn.answer-wrong {
            background: var(--card) !important;
            color: #8b3939 !important;
            box-shadow: inset 0 0 0 2px var(--danger), var(--neu-out-sm) !important;
            font-weight: 700 !important;
        }

        /* Ending rules grid in modal */
        .ending-rules-block { text-align: left; }
        .ending-rules-title {
            font-size: 0.72rem;
            color: var(--text-light);
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .ending-rules-grid {
            display: grid;
            grid-template-columns: 1fr auto;
            row-gap: 5px;
            column-gap: 14px;
            font-size: 0.82rem;
            color: var(--text);
        }
        .ending-rules-grid > div:nth-child(odd) { font-weight: 600; }
        .ending-rules-grid > div:nth-child(even) {
            color: var(--text-light);
            font-variant-numeric: tabular-nums;
            text-align: right;
        }

        /* Image-based question display */
        .scene-image {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 14px;
            margin-bottom: 16px;
            box-shadow: var(--neu-in-sm);
            overflow: hidden;
        }
        .scene-image svg {
            display: block;
            width: 100%;
            height: auto;
            max-height: 240px;
        }

        /* Tool count chip on quiz menu */
        .tool-count {
            display: inline-block;
            min-width: 24px;
            background: var(--sage);
            color: white;
            border-radius: var(--radius-pill);
            padding: 2px 10px;
            font-size: 0.72rem;
            font-weight: 700;
            margin-left: 6px;
            vertical-align: middle;
            font-variant-numeric: tabular-nums;
        }
        #exam-timer {
            font-variant-numeric: tabular-nums;
            font-weight: 800;
            color: var(--danger);
        }

        /* Language toggle */
        #lang-toggle {
            position: fixed;
            top: 12px;
            right: 14px;
            z-index: 60;
            display: inline-flex;
            background: var(--card);
            border-radius: var(--radius-pill);
            padding: 4px;
            box-shadow: var(--neu-out-sm);
        }
        #lang-toggle button {
            border: none;
            background: transparent;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 13px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            color: var(--text-light);
            font-family: inherit;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        #lang-toggle button.active {
            background: var(--sage);
            color: white;
        }

        /* Toast notification (combo / boss alerts) */
        .toast {
            position: fixed;
            top: 18%;
            left: 50%;
            transform: translate(-50%, -16px) scale(0.9);
            background: var(--card);
            color: var(--sage-dark);
            padding: 14px 30px;
            border-radius: var(--radius-pill);
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: -0.01em;
            box-shadow: var(--neu-out);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.18, 1.4, 0.4, 1);
            z-index: 2000;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0) scale(1);
        }
        .toast.toast-boss {
            background: var(--card);
            color: var(--warning);
            box-shadow: var(--neu-out);
        }

        /* Lifetime stats pills on menu */
        .lifetime-stats {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 0 0 22px;
            flex-wrap: wrap;
        }
        .stat-pill {
            background: var(--card);
            color: var(--text);
            padding: 7px 14px;
            border-radius: var(--radius-pill);
            font-size: 0.78rem;
            font-weight: 700;
            box-shadow: var(--neu-out-sm);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.01em;
        }

        /* Settings screen */
        .settings-section {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(100, 116, 139, 0.12);
        }
        .settings-section:last-of-type { border-bottom: none; }
        .settings-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-light);
            font-weight: 700;
            margin-bottom: 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }
        .stat-card {
            background: var(--card);
            border: none;
            border-radius: 18px;
            padding: 18px 14px;
            text-align: center;
            box-shadow: var(--neu-out-sm);
        }
        .stat-num {
            font-size: 1.9rem;
            font-weight: 800;
            color: var(--sage-dark);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }
        .stat-lbl {
            font-size: 0.7rem;
            color: var(--text-light);
            font-weight: 700;
            margin-top: 4px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* Disclaimer overlay */
        #disclaimer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 41, 59, 0.55);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 3000;
        }
        #disclaimer-overlay.active { display: flex; }
        #disclaimer-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 26px 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 24px 48px rgba(15, 23, 42, 0.25);
        }
        #disclaimer-title {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--danger);
            margin: 0 0 14px;
            letter-spacing: -0.01em;
        }
        #disclaimer-body {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #334155;
            white-space: pre-wrap;
            margin-bottom: 18px;
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(127, 168, 129, 0.35); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(127, 168, 129, 0.6); }
        #log-bar::-webkit-scrollbar-thumb,
        #modal::-webkit-scrollbar-thumb { background: rgba(100, 116, 139, 0.25); }
    </style>
</head>
<body>

    <div id="lang-toggle" role="group" aria-label="Language toggle">
        <button id="lang-ko" class="active" onclick="setLang('ko')" aria-label="한국어로 전환" aria-pressed="true">한국어</button>
        <button id="lang-en" onclick="setLang('en')" aria-label="Switch to English" aria-pressed="false">English</button>
    </div>

    <div id="top-bar" class="hidden">
        <div>❤️ HP: <span id="hp" style="color:var(--success)">100</span></div>
        <div>⭐ 평판: <span id="rep">0</span></div>
    </div>

    <div id="progress-wrap" class="hidden">
        <div id="progress-fill"></div>
    </div>
    <div id="progress-info" class="hidden">
        <span id="progress-text"></span>
        <span id="progress-percent">0%</span>
    </div>

    <div id="inventory-bar" class="hidden"></div>

    <div id="game-area"></div>

    <div id="log-bar" class="hidden"></div>

    <div id="modal">
        <h2 id="modal-title" style="color: var(--danger);"></h2>
        <p id="modal-desc" style="text-align: center; color: #cbd5e1; margin-bottom: 18px;"></p>
        <div id="modal-stats"></div>

        <hr>

        <h3 id="modal-promo-title"></h3>
        <div class="quiz-panel">
            <div class="quiz-meta">
                <span><span id="modal-left-label"></span>: <strong id="left" style="color:#fff">-</strong></span>
                <span><span id="modal-rank-label"></span>: <strong id="rank" style="color:var(--warning)"></strong></span>
            </div>

            <div id="question-box"></div>
            <div id="choices"></div>

            <div id="result"></div>
            <div style="text-align: center; margin-top: 10px;">
                <span style="font-size: 0.9rem; color: #94a3b8;"><span id="modal-score-label"></span>: <span id="score" style="color:#fff; font-weight:700;">0</span><span id="modal-pts"></span></span>
            </div>
        </div>
        <button id="modal-home-btn" class="choice-btn ghost center" style="margin-top: 22px; max-width: 360px; color:#e2e8f0; border-color: rgba(255,255,255,0.2);" onclick="location.reload()"></button>
    </div>

    <div id="disclaimer-overlay" role="dialog" aria-modal="true" aria-labelledby="disclaimer-title">
        <div id="disclaimer-card">
            <h2 id="disclaimer-title"></h2>
            <p id="disclaimer-body"></p>
            <button id="disclaimer-btn" class="choice-btn primary"></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
